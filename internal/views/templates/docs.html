{{define "docs-content"}}
<div class="min-h-screen bg-white dark:bg-dark-surface">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-4">API Documentation</h1>
        <p class="text-gray-600 dark:text-gray-300 mb-8">
            The hCTF2 REST API provides programmatic access to challenges, teams, submissions, and scoreboard data.
            Use this interactive documentation to explore available endpoints, request/response formats, and authentication requirements.
        </p>
        <div id="redoc-container" class="rounded-lg border border-gray-200 dark:border-dark-border overflow-hidden"></div>
    </div>
</div>

<!-- Use Swagger UI with custom dark theme -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<style>
    /* Swagger UI Dark Theme - Native dark mode support */
    .dark .swagger-ui {
        background: #1e293b;
    }
    
    /* Top bar / Info section */
    .dark .swagger-ui .topbar,
    .dark .swagger-ui .info {
        background: #1e293b !important;
    }
    .dark .swagger-ui .info .title,
    .dark .swagger-ui .info p,
    .dark .swagger-ui .info li,
    .dark .swagger-ui .info .base-url {
        color: #e2e8f0 !important;
    }
    .dark .swagger-ui .info a {
        color: #60a5fa !important;
    }
    
    /* Scheme container (servers section) */
    .dark .swagger-ui .scheme-container {
        background: #0f172a !important;
        box-shadow: none;
    }
    .dark .swagger-ui .scheme-container .schemes > label {
        color: #e2e8f0 !important;
    }
    
    /* Operation blocks */
    .dark .swagger-ui .opblock {
        background: #1e293b;
        border-color: #334155;
    }
    .dark .swagger-ui .opblock .opblock-summary {
        border-color: #334155;
    }
    .dark .swagger-ui .opblock .opblock-summary-method {
        color: #fff;
    }
    .dark .swagger-ui .opblock .opblock-summary-path,
    .dark .swagger-ui .opblock .opblock-summary-description {
        color: #e2e8f0;
    }
    .dark .swagger-ui .opblock-tag {
        color: #e2e8f0;
        border-color: #334155;
    }
    .dark .swagger-ui .opblock-tag:hover {
        background: rgba(255,255,255,0.05);
    }
    
    /* Section headers */
    .dark .swagger-ui .opblock-section-header {
        background: #0f172a;
        border-color: #334155;
    }
    .dark .swagger-ui .opblock-section-header h4 {
        color: #e2e8f0;
    }
    .dark .swagger-ui .opblock-section-header label {
        color: #94a3b8;
    }
    .dark .swagger-ui .opblock-section-header .btn {
        background: #3b82f6;
        border-color: #3b82f6;
        color: #fff;
    }
    
    /* Tab headers */
    .dark .swagger-ui .tab li a {
        color: #94a3b8;
    }
    .dark .swagger-ui .tab li.active a {
        color: #60a5fa;
        border-color: #60a5fa;
    }
    
    /* Parameters */
    .dark .swagger-ui .parameter__name {
        color: #e2e8f0;
    }
    .dark .swagger-ui .parameter__type {
        color: #94a3b8;
    }
    .dark .swagger-ui .parameter__in {
        color: #64748b;
    }
    .dark .swagger-ui .parameter__deprecated,
    .dark .swagger-ui .parameter__empty_value_toggle {
        color: #94a3b8;
    }
    
    /* Response section */
    .dark .swagger-ui .responses-inner h4,
    .dark .swagger-ui .responses-inner h5 {
        color: #e2e8f0;
    }
    .dark .swagger-ui .response-col_status {
        color: #e2e8f0;
    }
    .dark .swagger-ui .response-col_description {
        color: #cbd5e1;
    }
    
    /* Tables */
    .dark .swagger-ui table thead tr th,
    .dark .swagger-ui table thead tr td {
        color: #e2e8f0;
        border-color: #334155;
    }
    .dark .swagger-ui table tbody tr td {
        color: #cbd5e1;
        border-color: #334155;
    }
    .dark .swagger-ui table tbody tr:nth-child(odd) {
        background: rgba(255,255,255,0.02);
    }
    
    /* Code samples */
    .dark .swagger-ui .highlight-code {
        background: #0f172a;
    }
    .dark .swagger-ui .highlight-code .microlight {
        color: #e2e8f0;
    }
    
    /* Models / Schemas */
    .dark .swagger-ui .model-title {
        color: #e2e8f0;
    }
    .dark .swagger-ui .model-box {
        background: #0f172a;
        border-color: #334155;
    }
    .dark .swagger-ui .model .property.primitive {
        color: #94a3b8;
    }
    .dark .swagger-ui .prop-type {
        color: #60a5fa;
    }
    .dark .swagger-ui .prop-format {
        color: #64748b;
    }
    .dark .swagger-ui .model-hint {
        color: #64748b;
    }
    
    /* Buttons */
    .dark .swagger-ui .btn {
        background: #334155;
        border-color: #475569;
        color: #e2e8f0;
    }
    .dark .swagger-ui .btn:hover {
        background: #475569;
    }
    .dark .swagger-ui .btn.execute {
        background: #22c55e;
        border-color: #22c55e;
        color: #fff;
    }
    .dark .swagger-ui .btn.authorize {
        background: #3b82f6;
        border-color: #3b82f6;
        color: #fff;
    }
    
    /* Select dropdowns */
    .dark .swagger-ui select {
        background: #0f172a;
        border-color: #334155;
        color: #e2e8f0;
    }
    
    /* Input fields */
    .dark .swagger-ui input[type="text"],
    .dark .swagger-ui textarea {
        background: #0f172a;
        border-color: #334155;
        color: #e2e8f0;
    }
    
    /* Curl command */
    .dark .swagger-ui .curl {
        background: #0f172a;
        border-color: #334155;
    }
    .dark .swagger-ui .curl-command {
        color: #e2e8f0;
    }
    
    /* Errors */
    .dark .swagger-ui .errors-wrapper {
        background: rgba(239, 68, 68, 0.1);
        border-color: #ef4444;
    }
    .dark .swagger-ui .errors .message th {
        color: #ef4444;
    }
</style>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        SwaggerUIBundle({
            url: '/api/openapi.yaml',
            dom_id: '#redoc-container',
            deepLinking: true,
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIBundle.presets.standalone
            ],
            plugins: [
                SwaggerUIBundle.plugins.DownloadUrl
            ],
            layout: "BaseLayout",
            validatorUrl: null
        });
    });
</script>
{{end}}
